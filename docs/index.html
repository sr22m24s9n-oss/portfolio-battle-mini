<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Battle Mini</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171a1f;
      --panel: #232832;
      --text: #f4f0e8;
      --muted: #b8c0cc;
      --accent: #f0b84f;
      --line: #3c4452;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 680px);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      background: var(--accent);
      color: #18130b;
      font-weight: 700;
      text-decoration: none;
      border-radius: 6px;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Portfolio Battle Mini</h1>
    <p>通常プレイの記録から、次の「痕跡譜面」を作る小さな音ゲー試作です。</p>
    <p>スマホ縦画面を想定しています。音が出るので、音量に注意して開始してください。</p>
    <a href="./play/">ゲームを開く</a>
    <p class="note">初回読み込みには少し時間がかかる場合があります。</p>
  </main>
</body>
</html>
